name: Run Every 5 Hours

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      PYTHONPATH: .
      YOUTUBE_CLIENT_SECRETS_FILE: src/core/client_secret_898959306234-vkba241fn3ra80rurlnatvagc3hnqjo3.apps.googleusercontent.com.json
      YOUTUBE_TOKEN_FILE: youtube_token.json
      YOUTUBE_UPLOAD_COUNT_FILE: uploaded_videos_count.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI car driving upload pipeline
        run: python -c "from src.pipeline.pipeline import build_and_upload_ai_car_driving_short; print(build_and_upload_ai_car_driving_short())"

      - name: Commit updated upload count
        shell: bash
        run: |
          if [ -f uploaded_videos_count.json ] && [ -n "$(git status --porcelain uploaded_videos_count.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uploaded_videos_count.json
            git commit -m "Update uploaded videos count"
            git push
          fi
